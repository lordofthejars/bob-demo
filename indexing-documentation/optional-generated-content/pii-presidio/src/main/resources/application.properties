# Quarkus Presidio Configuration

# DevServices Configuration (Development/Test Mode)
# DevServices automatically starts Presidio containers in dev/test mode
# These are enabled by default, no configuration needed for development

# Uncomment to disable DevServices for analyzer
# quarkus.presidio.devservices.analyzer.enabled=false

# Uncomment to disable DevServices for anonymizer
# quarkus.presidio.devservices.anonymizer.enabled=false

# Uncomment to use custom container images
# quarkus.presidio.devservices.analyzer.image=mcr.microsoft.com/presidio-analyzer:latest
# quarkus.presidio.devservices.anonymizer.image=mcr.microsoft.com/presidio-anonymizer:latest

# Production Configuration
# Configure these when deploying to production with external Presidio services

# Analyzer service URL (production)
%prod.quarkus.rest-client.presidio-analyzer.url=http://presidio-analyzer:5001

# Anonymizer service URL (production)
%prod.quarkus.rest-client.presidio-anonymizer.url=http://presidio-anonymizer:5002

# Disable DevServices in production
%prod.quarkus.presidio.devservices.analyzer.enabled=false
%prod.quarkus.presidio.devservices.anonymizer.enabled=false

# Health Check Configuration
# Health checks are enabled by default and ping the /health endpoint of Presidio services
# Uncomment to disable health checks
# quarkus.presidio.health.enabled=false

# REST Client Configuration (Optional)
# Configure timeouts and other REST client properties

# Connection timeout (default: 30 seconds)
# quarkus.rest-client.presidio-analyzer.connect-timeout=30000
# quarkus.rest-client.presidio-anonymizer.connect-timeout=30000

# Read timeout (default: 30 seconds)
# quarkus.rest-client.presidio-analyzer.read-timeout=30000
# quarkus.rest-client.presidio-anonymizer.read-timeout=30000

# Logging Configuration (Optional)
# Uncomment to enable detailed logging for Presidio operations
# quarkus.log.category."io.quarkiverse.presidio".level=DEBUG

